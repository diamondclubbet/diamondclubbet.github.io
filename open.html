  <style>
    body {
      background: #111;
      color: #fff;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      background: #1c1c1c;
      padding: 40px;
      border-radius: 12px;
      text-align: center;
      width: 520px;
    }
    h2 {
      color: gold;
      margin-bottom: 25px;
    }
    input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      margin: 15px 0;
      border-radius: 6px;
      border: none;
    }
    button {
      display: block;
      width: 100%;
      margin: 12px 0;
      padding: 14px;
      font-size: 18px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: gold;
      color: #000;
    }
    button:hover {
      background: #ffd700;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
